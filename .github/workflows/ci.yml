name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rustfmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # `-D warnings` promotes the determinism guardrails to hard
      # failures: the workspace `disallowed-types` (HashMap/HashSet) and
      # monada-sim's `#![deny(float_arithmetic)]` both gate here, before
      # anything can desync a platform (DESIGN.md §8).
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --release

  determinism:
    name: oracle hash-diff (${{ matrix.os }})
    # The cross-platform claim under test: the canonical sim must reach
    # the committed goldens on every OS/arch, not just run-to-run on one.
    # A divergence fails the matrix leg that drifted (DESIGN.md §3.1, §7).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check sim hashes against monada-hashes.txt
        run: cargo run -p monada-oracle --release -- --check
      - name: Dump this platform's hashes
        if: always()
        run: cargo run -p monada-oracle --release -- --print > hashes-${{ matrix.os }}.txt
      - name: Upload hashes artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monada-hashes-${{ matrix.os }}
          path: hashes-${{ matrix.os }}.txt
