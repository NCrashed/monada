[package]
name = "monada-host"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "monada native host binary: winit + roxlap render facade + sim loop glue."
# Application binary, not a library for downstream consumption.
publish = false

[[bin]]
name = "monada-host"
path = "src/main.rs"

[dependencies]
monada-sim = { workspace = true }
monada-render = { workspace = true }
# Render facade + camera/opticast types. Local path (sibling roxlap)
# matches monada-render's dependency on the same checkout.
roxlap-render = { path = "../../../roxlap/crates/roxlap-render" }
roxlap-core = { path = "../../../roxlap/crates/roxlap-core" }
winit = "0.30"

[lints]
workspace = true
